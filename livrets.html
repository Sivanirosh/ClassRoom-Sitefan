<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secteur : Les Livrets — Hub de Mission</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.65;
            letter-spacing: 0.04em;
            background-color: #0b0f19;
            color: #f1f5f9;
        }
        p, span, label, button { letter-spacing: 0.04em; }
        .game-card {
            background: linear-gradient(145deg, #161d30, #0f1524);
            border: 1px solid #24324f;
        }
        .btn-game-active {
            transform: translateY(0);
            box-shadow: 0 4px 0px 0px #05070f;
            transition: all 0.1s ease;
        }
        .btn-game-active:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px 0px #05070f;
        }
        .key-btn {
            background-color: #172033;
            border: 1px solid #2e3e65;
            font-weight: 900;
            transition: all 0.1s;
            touch-action: manipulation; /* Évite le zoom parasite sur iPad */
        }
        .key-btn:active {
            background-color: #0e1422;
            transform: scale(0.95);
        }
    </style>
    <script type="module">
        // --- CONFIGURATION ET INITIALISATION DE FIREBASE ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAvXQI3f34J5htG-t9kroM4ynIqCgO9xXI",
            authDomain: "ma-classe-179de.firebaseapp.com",
            projectId: "ma-classe-179de",
            storageBucket: "ma-classe-179de.firebasestorage.app",
            messagingSenderId: "413792574665",
            appId: "1:413792574665:web:87c29e054af287018e0118"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = "classe-primaire-2026";

        // Fonction pour envoyer les résultats de l'élève sur votre base Firestore
        async function enregistrerScoreFirebase(exercice, corrects, fautes) {
            const urlParams = new URLSearchParams(window.location.search);
            const nomEleve = urlParams.get('eleve') || sessionStorage.getItem('nomEleve') || "Anonyme";
            
            try {
                await addDoc(collection(db, `artifacts/${appId}/public/data/scores`), {
                    nomEleve: nomEleve,
                    exercice: exercice,
                    corrects: corrects,
                    fautes: fautes,
                    timestamp: Date.now()
                });
            } catch (e) { console.error(e); }
        }
        window.enregistrerScoreFirebase = enregistrerScoreFirebase;
    </script>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <header class="bg-[#0e1422] border-b border-slate-800 py-4 shadow-lg">
        <div class="max-w-md mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-cyan-500 to-blue-600 text-white p-2 rounded-xl border border-cyan-400/30">
                    <span class="text-xl">💻</span>
                </div>
                <div>
                    <h1 class="text-md font-black text-white tracking-wide uppercase">Code : Les Livrets</h1>
                    <p id="affichage-nom" class="text-xs font-bold text-cyan-400 tracking-wider">Agent : Chargement...</p>
                </div>
            </div>
            <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-2 rounded-xl text-xs font-bold tracking-wider uppercase border border-slate-700 transition-all">↩ QG</a>
        </div>
    </header>

    <main class="flex-grow max-w-md w-full mx-auto px-4 py-6 flex flex-col justify-center space-y-4">
        
        <div id="setup-card" class="game-card rounded-2xl p-6 border shadow-xl space-y-4">
            <h2 class="text-xl font-black text-white uppercase tracking-wide text-center">Sélection des livrets</h2>
            <p class="text-xs text-slate-400 text-center">Cochez les tables que vous voulez travailler :</p>
            
            <div id="grid-selection" class="grid grid-cols-3 gap-2 py-2"></div>

            <button onclick="demarrerMission()" class="btn-game-active w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest border border-cyan-400/30 shadow-lg">
                Lancer la Mission 🧭
            </button>
        </div>

        <div id="game-card" class="game-card rounded-2xl p-6 border shadow-xl space-y-4 hidden">
            <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Calcul <span id="num-question" class="text-cyan-400 font-black">1</span> / 10</span>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Score : <span id="score-actuel" class="text-emerald-400 font-black">0</span></span>
            </div>

            <div class="text-center">
                <div id="enonce" class="text-4xl font-black text-white tracking-wider font-mono bg-[#090d16] inline-block px-8 py-4 rounded-2xl border border-slate-800 shadow-inner mb-2">
                    -- · --
                </div>
                <div class="h-10 flex justify-center items-center">
                    <span id="reponse-visuelle" class="text-3xl font-black text-cyan-400 tracking-widest font-mono"></span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="toggleAideVisuelle()" class="bg-slate-900 border border-slate-800 text-amber-400 font-bold py-2 px-3 rounded-xl text-xs hover:bg-slate-800 transition-all">
                    💡 Aide Visuelle (Points)
                </button>
                <button onclick="toggleTableAide()" class="bg-slate-900 border border-slate-800 text-sky-400 font-bold py-2 px-3 rounded-xl text-xs hover:bg-slate-800 transition-all">
                    📋 Afficher la Table
                </button>
            </div>

            <div id="aide-visuelle-container" class="bg-[#090d16] p-4 rounded-xl border border-slate-800 hidden">
                <p class="text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-3 text-center">Représentation (Colonnes × Lignes)</p>
                <div id="dot-matrix" class="grid gap-1.5 p-2 bg-slate-950 rounded-lg border border-slate-900 justify-center"></div>
            </div>

            <div id="table-aide-container" class="bg-[#090d16] p-4 rounded-xl border border-slate-800 text-center hidden">
                <h4 id="table-aide-titre" class="text-xs font-bold text-sky-400 mb-2 uppercase tracking-wide"></h4>
                <div id="table-aide-contenu" class="text-xs text-slate-300 grid grid-cols-2 gap-1 text-left max-w-[200px] mx-auto font-mono"></div>
            </div>

            <div class="grid grid-cols-3 gap-2 pt-2">
                <button onclick="pressKey(1)" class="key-btn text-white py-3.5 rounded-xl text-xl">1</button>
                <button onclick="pressKey(2)" class="key-btn text-white py-3.5 rounded-xl text-xl">2</button>
                <button onclick="pressKey(3)" class="key-btn text-white py-3.5 rounded-xl text-xl">3</button>
                <button onclick="pressKey(4)" class="key-btn text-white py-3.5 rounded-xl text-xl">4</button>
                <button onclick="pressKey(5)" class="key-btn text-white py-3.5 rounded-xl text-xl">5</button>
                <button onclick="pressKey(6)" class="key-btn text-white py-3.5 rounded-xl text-xl">6</button>
                <button onclick="pressKey(7)" class="key-btn text-white py-3.5 rounded-xl text-xl">7</button>
                <button onclick="pressKey(8)" class="key-btn text-white py-3.5 rounded-xl text-xl">8</button>
                <button onclick="pressKey(9)" class="key-btn text-white py-3.5 rounded-xl text-xl">9</button>
                <button onclick="pressKey('C')" class="key-btn text-rose-400 py-3.5 rounded-xl text-xs uppercase tracking-wider">Effacer</button>
                <button onclick="pressKey(0)" class="key-btn text-white py-3.5 rounded-xl text-xl">0</button>
                <button onclick="validerReponse()" class="key-btn bg-cyan-950 text-cyan-400 border-cyan-800/80 py-3.5 rounded-xl text-sm uppercase tracking-wider">OK</button>
            </div>

            <div id="feedback" class="text-center font-bold text-sm h-6"></div>
        </div>

        <div id="end-card" class="game-card rounded-2xl p-8 border shadow-xl text-center hidden space-y-6">
            <h2 class="text-2xl font-black text-white uppercase tracking-wide">💻 Matrice décodée avec succès !</h2>
            <div class="bg-[#090d16] p-6 rounded-2xl border border-slate-800 max-w-xs mx-auto">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Score Final</p>
                <p class="text-4xl font-black text-cyan-400"><span id="final-score">0</span> / 10</p>
            </div>
            <p id="appreciation" class="font-bold text-white text-lg"></p>
            <a href="index.html" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-black px-6 py-3.5 rounded-xl text-xs uppercase tracking-widest border border-indigo-400/30 shadow-lg btn-game-active">Retourner au Hub de Mission</a>
        </div>

    </main>

    <script>
        let score = 0;
        let questionActuelle = 1;
        let facteur1, facteur2, reponseCorrecte;
        let saisieActuelle = "";
        let blocageSaisie = false; // Bloque le clavier durant les 2s d'affichage de la correction
        let tablesSelectionnees = []; // Tableau qui va contenir les tables choisies par l'élève

        // Récupération et affichage du nom de l'élève depuis l'URL ou la session
        const urlParams = new URLSearchParams(window.location.search);
        const nomEleve = urlParams.get('eleve') || sessionStorage.getItem('nomEleve') || "Explorateur";
        document.getElementById('affichage-nom').innerText = `Agent : ${nomEleve}`;

        // --- FONCTION : CRÉATION DU FORMULAIRE DE SÉLECTION AU CHARGEMENT ---
        function preparerEcranSelection() {
            const container = document.getElementById('grid-selection');
            container.innerHTML = "";
            // On génère des cases à cocher pour les livrets de 2 à 12
            for (let i = 2; i <= 12; i++) {
                const label = document.createElement('label');
                label.className = "flex items-center justify-center gap-2 p-3 bg-[#172033] border border-slate-700 rounded-xl cursor-pointer hover:border-cyan-500 transition-all text-xs font-bold text-slate-300";
                label.innerHTML = `
                    <input type="checkbox" value="${i}" class="w-4 h-4 accent-cyan-500">
                    <span>L. ${i}</span>
                `;
                container.appendChild(label);
            }
        }

        // --- FONCTION : TRANSITION DE L'ÉCRAN DE SÉLECTION VERS LE JEU ---
        function demarrerMission() {
            const casesCochees = document.querySelectorAll('#grid-selection input:checked');
            tablesSelectionnees = Array.from(casesCochees).map(box => parseInt(box.value));

            // Si l'élève n'a rien coché, on lui met un avertissement et on bloque
            if (tablesSelectionnees.length === 0) {
                alert("Choisis au moins un livret pour commencer l'exercice !");
                return;
            }

            // Changement d'affichage des boîtes (Masquer la configuration, afficher le jeu)
            document.getElementById('setup-card').classList.add('hidden');
            document.getElementById('game-card').classList.remove('hidden');

            genererCalcul();
        }

        // --- FONCTION : CRÉATION D'UNE QUESTION ALÉATOIRE ---
        function genererCalcul() {
            if (questionActuelle > 10) {
                terminerPartie();
                return;
            }
            // Réinitialisation de l'état graphique pour le nouveau calcul
            blocageSaisie = false;
            document.getElementById('num-question').innerText = questionActuelle;
            document.getElementById('feedback').innerText = '';
            saisieActuelle = "";
            document.getElementById('reponse-visuelle').innerText = "";
            
            // On replie automatiquement les volets d'aides ouverts au calcul précédent
            document.getElementById('aide-visuelle-container').classList.add('hidden');
            document.getElementById('table-aide-container').classList.add('hidden');

            // On pioche une table au hasard parmi la sélection faite par l'élève
            facteur1 = tablesSelectionnees[Math.floor(Math.random() * tablesSelectionnees.length)];
            // On génère le multiplicateur (de 1 à 10)
            facteur2 = Math.floor(Math.random() * 10) + 1; 
            reponseCorrecte = facteur1 * facteur2;

            // Affichage avec le POINT MÉDIAN (·) à la place de la croix
            document.getElementById('enonce').innerText = `${facteur1} · ${facteur2}`;
        }

        // --- FONCTION : RECEPTION DES ENTRÉES DU PAVÉ NUMÉRIQUE OU CLAVIER ---
        function pressKey(touche) {
            if (blocageSaisie) return;

            if (touche === 'C' || touche === 'Backspace') {
                saisieActuelle = "";
            } else {
                if (saisieActuelle.length < 3) saisieActuelle += touche.toString();
            }
            document.getElementById('reponse-visuelle').innerText = saisieActuelle;
        }

        // --- FONCTION : ANALYSE ET CORRECTION DE LA RÉPONSE ---
        function validerReponse() {
            if (saisieActuelle === "" || blocageSaisie) return;
            
            blocageSaisie = true; // Verrouille les inputs pour éviter le double-clic parasite
            const reponseEleve = parseInt(saisieActuelle);
            const fb = document.getElementById('feedback');

            if (reponseEleve === reponseCorrecte) {
                score++;
                fb.className = "text-center font-bold text-sm text-emerald-400";
                fb.innerText = "⚡ Flux Intègre ! +1 Donnée.";
            } else {
                fb.className = "text-center font-bold text-sm text-rose-400";
                // Remplacement du mot cassant "Corruption" par une phrase d'analyse bienveillante
                fb.innerText = `🔍 Oups, analyse incomplète. La bonne clé était ${reponseCorrecte}`;
            }

            document.getElementById('score-actuel').innerText = score;
            questionActuelle++;
            setTimeout(genererCalcul, 2000);
        }

        // --- FONCTION : CONSTRUIRE ET PASSER L'AFFICHAGE DE LA MATRICE DE POINTS ---
        function toggleAideVisuelle() {
            const box = document.getElementById('aide-visuelle-container');
            if (!box.classList.contains('hidden')) {
                box.classList.add('hidden');
                return;
            }

            const matrix = document.getElementById('dot-matrix');
            matrix.innerHTML = "";
            
            // Établissement des colonnes CSS fondé sur la valeur du premier facteur (Ex: 4 colonnes)
            matrix.style.gridTemplateColumns = `repeat(${facteur1}, minmax(0, 1fr))`;

            // On génère le nombre total de points requis (Ex: 4 x 6 = 24 points dessinés)
            const totalPoints = facteur1 * facteur2;
            for (let i = 0; i < totalPoints; i++) {
                const dot = document.createElement('div');
                dot.className = "w-2.5 h-2.5 rounded-full bg-cyan-400 mx-0.5";
                matrix.appendChild(dot);
            }

            box.classList.remove('hidden');
        }

        // --- FONCTION : CONSTRUIRE ET PASSER L'AFFICHAGE DE LA TABLE D'AIDE ---
        function toggleTableAide() {
            const box = document.getElementById('table-aide-container');
            if (!box.classList.contains('hidden')) {
                box.classList.add('hidden');
                return;
            }

            document.getElementById('table-aide-titre').innerText = `Livret de ${facteur1}`;
            const contenu = document.getElementById('table-aide-contenu');
            contenu.innerHTML = "";

            // Écriture des 10 lignes du livret en cours de calcul
            for (let i = 1; i <= 10; i++) {
                const ligne = document.createElement('div');
                // Si la ligne correspond exactement au multiplicateur recherché, on la met en surbrillance ambre
                if (i === facteur2) {
                    ligne.className = "text-amber-400 font-bold bg-slate-900/60 px-1 rounded";
                }
                ligne.innerText = `${facteur1} · ${i} = ${facteur1 * i}`;
                contenu.appendChild(ligne);
            }

            box.classList.remove('hidden');
        }

        // --- GESTIONNAIRE D'ÉVÉNEMENT CLAVIER (iPad + Ordinateur) ---
        window.addEventListener('keydown', function(event) {
            // Désactive les écoutes si l'élève est sur l'écran de fin ou l'écran de sélection
            if (document.getElementById('game-card').classList.contains('hidden')) return;

            if (event.key >= '0' && event.key <= '9') {
                pressKey(parseInt(event.key));
            } else if (event.key === 'Backspace' || event.key === 'Delete') {
                pressKey('C');
            } else if (event.key === 'Enter') {
                validerReponse();
            }
        });

        // Bilan de fin de session d'exercice
        async function terminerPartie() {
            document.getElementById('game-card').classList.add('hidden');
            document.getElementById('end-card').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            let appreciation = score >= 8 ? "🏆 Maître de la Matrice ! Performance exceptionnelle." : "⚔️ Flux instable. Revois tes protocoles de calcul.";
            document.getElementById('appreciation').innerText = appreciation;

            if (typeof window.enregistrerScoreFirebase === 'function') {
                await window.enregistrerScoreFirebase("Atelier Livrets", score, 10 - score);
            }
        }

        // Commande d'initialisation automatique au lancement de la page
        preparerEcranSelection();
    </script>
</body>
</html>
