<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secteur : Géométrie — Hub de Mission</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.65;
            letter-spacing: 0.04em;
            background-color: #0b0f19;
            color: #f1f5f9;
        }
        p, span, label, button { letter-spacing: 0.04em; }
        .game-card {
            background: linear-gradient(145deg, #161d30, #0f1524);
            border: 1px solid #24324f;
        }
        .btn-game-active {
            transform: translateY(0);
            box-shadow: 0 4px 0px 0px #05070f;
            transition: all 0.1s ease;
        }
        .btn-game-active:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px 0px #05070f;
        }
        .option-btn {
            background-color: #172033;
            border: 1px solid #2e3e65;
            transition: all 0.2s;
        }
        .option-btn:hover {
            border-color: #10b981;
            background-color: #112926;
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAvXQI3f34J5htG-t9kroM4ynIqCgO9xXI",
            authDomain: "ma-classe-179de.firebaseapp.com",
            projectId: "ma-classe-179de",
            storageBucket: "ma-classe-179de.firebasestorage.app",
            messagingSenderId: "413792574665",
            appId: "1:413792574665:web:87c29e054af287018e0118"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = "classe-primaire-2026";

        async function enregistrerScoreFirebase(exercice, corrects, fautes) {
            const urlParams = new URLSearchParams(window.location.search);
            const nomEleve = urlParams.get('eleve') || sessionStorage.getItem('nomEleve') || "Anonyme";
            
            try {
                await addDoc(collection(db, `artifacts/${appId}/public/data/scores`), {
                    nomEleve: nomEleve,
                    exercice: exercice,
                    corrects: corrects,
                    fautes: fautes,
                    timestamp: Date.now()
                });
            } catch (e) { console.error(e); }
        }
        window.enregistrerScoreFirebase = enregistrerScoreFirebase;
    </script>
</head>
<body class="min-h-screen flex flex-col antialiased">

    <header class="bg-[#0e1422] border-b border-slate-800 py-4 shadow-lg">
        <div class="max-w-4xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-emerald-500 to-teal-600 text-white p-2 rounded-xl border border-emerald-400/30">
                    <span class="text-xl">📐</span>
                </div>
                <div>
                    <h1 class="text-md font-black text-white tracking-wide uppercase">Secteur : Géométrie</h1>
                    <p id="affichage-nom" class="text-xs font-bold text-emerald-400 tracking-wider">Agent : Chargement...</p>
                </div>
            </div>
            <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-2 rounded-xl text-xs font-bold tracking-wider uppercase border border-slate-700 transition-all">↩ QG</a>
        </div>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-8">
        
        <div id="game-card" class="game-card rounded-2xl p-6 sm:p-8 border shadow-xl space-y-6">
            <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Question <span id="num-question" class="text-emerald-400 font-black">1</span> / 10</span>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Score : <span id="score-actuel" class="text-emerald-400 font-black">0</span></span>
            </div>

            <div class="space-y-4">
                <p id="enonce" class="text-lg font-bold text-white leading-relaxed max-reading-width">Chargement de la structure...</p>
                
                <div id="zone-options" class="grid grid-cols-1 gap-3 pt-2">
                    <!-- Généré dynamiquement -->
                </div>
            </div>

            <div id="feedback" class="text-center font-bold text-sm h-6"></div>
        </div>

        <div id="end-card" class="game-card rounded-2xl p-8 border shadow-xl text-center hidden space-y-6">
            <h2 class="text-2xl font-black text-white uppercase tracking-wide">📐 Analyse Structurelle Validée !</h2>
            <div class="bg-[#090d16] p-6 rounded-2xl border border-slate-800 max-w-xs mx-auto">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Score Final</p>
                <p class="text-4xl font-black text-emerald-400"><span id="final-score">0</span> / 10</p>
            </div>
            <p id="appreciation" class="font-bold text-white text-lg"></p>
            <a href="index.html" class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-black px-6 py-3.5 rounded-xl text-xs uppercase tracking-widest border border-indigo-400/30 shadow-lg btn-game-active">Retourner au Hub de Mission</a>
        </div>

    </main>

    <script>
        const banqueQuestions = [
            { q: "Quelle figure possède 4 côtés égaux et 4 angles droits ?", r: ["Le carré", "Le rectangle", "Le losange", "Le parallélogramme"], c: 0 },
            { q: "Quelle figure possède 4 côtés égaux mais pas d'angles droits ?", r: ["Le losange", "Le carré", "Le trapèze", "Le rectangle"], c: 0 },
            { q: "Combien de sommets possède un hexagone ?", r: ["6 sommets", "5 sommets", "8 sommets", "4 sommets"], c: 0 },
            { q: "Quel triangle possède un angle droit ?", r: ["Le triangle rectangle", "Le triangle isocèle", "Le triangle équilatéral", "Le triangle quelconque"], c: 0 },
            { q: "Quel triangle possède 3 côtés de longueurs totalement égales ?", r: ["Le triangle équilatéral", "Le triangle isocèle", "Le triangle rectangle", "Le triangle plat"], c: 0 },
            { q: "Comment appelle-t-on le segment qui relie le centre d'un cercle à son bord ?", r: ["Le rayon", "Le diamètre", "La corde", "La tangente"], c: 0 },
            { q: "Si le rayon d'un cercle mesure 5 cm, combien mesure son diamètre ?", r: ["10 cm", "2,5 cm", "15 cm", "5 cm"], c: 0 },
            { q: "Quelle figure possède 4 côtés, des angles droits, mais ses côtés opposés sont égaux deux à deux ?", r: ["Le rectangle", "Le carré", "Le losange", "Le parallélogramme"], c: 0 },
            { q: "Combien de côtés possède un pentagone ?", r: ["5 côtés", "6 côtés", "7 côtés", "4 côtés"], c: 0 },
            { q: "Quel triangle possède au moins 2 côtés de même longueur ?", r: ["Le triangle isocèle", "Le triangle équilatéral", "Le triangle scalène", "Le triangle rectangle"], c: 0 }
        ];

        let score = 0;
        let questionActuelle = 1;
        let indexBanque = 0;

        const urlParams = new URLSearchParams(window.location.search);
        const nomEleve = urlParams.get('eleve') || sessionStorage.getItem('nomEleve') || "Explorateur";
        document.getElementById('affichage-nom').innerText = `Agent : ${nomEleve}`;

        function chargerQuestion() {
            if (questionActuelle > 10) {
                terminerPartie();
                return;
            }
            document.getElementById('num-question').innerText = questionActuelle;
            document.getElementById('feedback').innerText = '';
            
            indexBanque = (questionActuelle - 1) % banqueQuestions.length;
            const qData = banqueQuestions[indexBanque];
            document.getElementById('enonce').innerText = qData.q;

            const zoneOptions = document.getElementById('zone-options');
            zoneOptions.innerHTML = '';

            qData.r.forEach((texteOption, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn text-left text-white font-bold px-5 py-4 rounded-xl text-base transition-all";
                btn.innerText = texteOption;
                btn.onclick = () => verifierReponse(idx);
                zoneOptions.appendChild(btn);
            });
        }

        function verifierReponse(choixIdx) {
            const qData = banqueQuestions[indexBanque];
            const fb = document.getElementById('feedback');
            const boutons = document.querySelectorAll('.option-btn');

            boutons.forEach(b => b.disabled = true);

            if (choixIdx === qData.c) {
                score++;
                fb.className = "text-center font-bold text-sm text-emerald-400";
                fb.innerText = "✅ Structure Identifiée ! +1 Analyse.";
                boutons[choixIdx].className = "option-btn text-left text-white font-bold px-5 py-4 rounded-xl text-base bg-emerald-950 border-emerald-500";
            } else {
                fb.className = "text-center font-bold text-sm text-rose-400";
                fb.innerText = `❌ Anomalie. La bonne réponse était : ${qData.r[qData.c]}`;
                boutons[choixIdx].className = "option-btn text-left text-white font-bold px-5 py-4 rounded-xl text-base bg-rose-950 border-rose-500";
                boutons[qData.c].className = "option-btn text-left text-white font-bold px-5 py-4 rounded-xl text-base bg-emerald-950 border-emerald-500";
            }

            document.getElementById('score-actuel').innerText = score;
            questionActuelle++;
            setTimeout(chargerQuestion, 2500);
        }

        async function terminerPartie() {
            document.getElementById('game-card').classList.add('hidden');
            document.getElementById('end-card').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            // Correction définitive du doublon textuel appliquée ici
            let appreciation = score >= 8 ? "Excellent travail ! Bravo ! 🌟" : "Continue à t'entraîner régulièrement. 💪";
            document.getElementById('appreciation').innerText = appreciation;

            if (typeof window.enregistrerScoreFirebase === 'function') {
                await window.enregistrerScoreFirebase("Défi Géométrie", score, 10 - score);
            }
        }

        chargerQuestion();
    </script>
</body>
</html>
