    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        }
        .game-card {
            background: linear-gradient(145deg, #161d30, #0f1524);
            border: 1px solid #24324f;
        }
        .btn-game-active {
            transform: translateY(0);
            box-shadow: 0 4px 0px 0px #05070f;
            transition: all 0.1s ease;
        }

            transform: translateY(4px);

        }

            background-color: #172033;
            border: 1px solid #2e3e65;

        }
        .option-btn:hover:not(:disabled) {
            border-color: #10b981;
            background-color: #112926;
        }
        .box-drop {
            border: 2px dashed #2e3e65;
            transition: all 0.2s;
        }
        .box-drop:hover {
            border-color: #10b981;
            background-color: #112926;
        }
        
        /* Effet de confettis / validation */
        @keyframes successPulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .success-anim {
            animation: successPulse 1s ease-out;
            border-color: #10b981 !important;
        }
        .error-anim {
            border-color: #f43f5e !important;
            background-color: #4c0519 !important;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAvXQI3f34J5htG-t9kroM4ynIqCgO9xXI",
            authDomain: "ma-classe-179de.firebaseapp.com",
            projectId: "ma-classe-179de",
            storageBucket: "ma-classe-179de.firebasestorage.app",
            messagingSenderId: "413792574665",
            appId: "1:413792574665:web:87c29e054af287018e0118"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = "classe-primaire-2026";

        async function enregistrerScoreFirebase(exercice, corrects, fautes) {
            const urlParams = new URLSearchParams(window.location.search);
            const nomEleve = urlParams.get('eleve') || sessionStorage.getItem('nomEleve') || "Anonyme";
            try {
                await addDoc(collection(db, `artifacts/${appId}/public/data/scores`), {
                    nomEleve: nomEleve,
                    exercice: exercice,
                    corrects: corrects,
                    fautes: fautes,
                    timestamp: Date.now()
                });
            } catch (e) { console.error("Erreur Firebase:", e); }
        }
        window.enregistrerScoreFirebase = enregistrerScoreFirebase;
    </script>

        // ------------------ MOTEUR GRAPHIQUE (SVG) ------------------
        function getSVGForShape(nom) {
            const baseClass = "w-32 h-32 text-cyan-400 drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]";
            const s = `<svg class="${baseClass}" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round">`;
            const e = `</svg>`;
            switch(nom) {
                case 'Carré': return s + `<rect x="20" y="20" width="60" height="60"/>` + e;
                case 'Rectangle': return s + `<rect x="10" y="30" width="80" height="40"/>` + e;
                case 'Triangle': return s + `<polygon points="50,20 15,80 85,80"/>` + e;
                case 'Cercle': return s + `<circle cx="50" cy="50" r="35"/>` + e;
                case 'Losange': return s + `<polygon points="50,10 85,50 50,90 15,50"/>` + e;
                case 'Parallélogramme': return s + `<polygon points="25,30 90,30 75,70 10,70"/>` + e;
                case 'Trapèze': return s + `<polygon points="30,30 70,30 90,70 10,70"/>` + e;
                case 'Triangle rectangle': return s + `<polygon points="20,20 20,80 80,80"/><polyline points="20,70 30,70 30,80"/>` + e;
                case 'Cerf-volant': return s + `<polygon points="50,10 80,40 50,90 20,40"/>` + e;
                case 'Cube': return s + `<rect x="30" y="30" width="40" height="40"/><polyline points="30,30 45,15 85,15 85,55 70,70"/><polyline points="85,15 70,30"/>` + e;
                case 'Pyramide à base carrée': return s + `<polygon points="50,15 20,70 80,70"/><polyline points="50,15 35,60 80,70"/><polyline points="20,70 35,60"/>` + e;
                default: return s + `<text x="50" y="55" font-size="40" text-anchor="middle" fill="currentColor" stroke="none">?</text>` + e;
            }
        }

            checkReady();
        }
        function selectMode(m) {
            config.mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('bg-emerald-900', 'border-emerald-500'));
            document.getElementById('btn-mode-'+m).classList.add('bg-emerald-900', 'border-emerald-500');
            checkReady();
        }
        function checkReady() {
            const btn = document.getElementById('btn-start');
            if(config.niveau && config.mode) {
                btn.removeAttribute('disabled');
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function demarrerMission() {
            // Filtrer la base de données selon le niveau
            let planes = banqueGeometrie.figures_planes.filter(f => f.niveaux.includes(config.niveau));
            let solides = banqueGeometrie.solides.filter(f => f.niveaux.includes(config.niveau));
            
            // Ajouter un tag type pour simplifier
            planes = planes.map(p => ({...p, type: 'plane'}));
            solides = solides.map(s => ({...s, type: 'solide'}));
            state.donneesFiltrees = [...planes, ...solides];

            document.getElementById('config-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            chargerQuestion();
        }

        function melanger(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ------------------ BOUCLE DE JEU ------------------
        function chargerQuestion() {
            if (state.question > 10) {
                terminerMission();
                return;
            }

            document.getElementById('num-question').innerText = state.question;
            const fb = document.getElementById('feedback');
            fb.innerHTML = ''; fb.className = "text-center font-bold text-base mt-6 min-h-[3rem] flex items-center justify-center rounded-xl transition-all duration-300";
            
            document.getElementById('game-container').classList.remove('success-anim', 'error-anim');

            // Reset pastilles
            document.getElementById('btn-pastille-indice').classList.add('hidden');
            document.getElementById('btn-pastille-visuel').classList.add('hidden');

            // Choisir le mode de la manche
            state.modeCourant = config.mode === 'Mixte' ? ['A', 'B', 'C'][Math.floor(Math.random()*3)] : config.mode;
            
            if(state.modeCourant === 'A') genererModeA();
            else if(state.modeCourant === 'B') genererModeB();
            else genererModeC();
        }

        // ---------- MODE A : QUI SUIS-JE ? ----------
        function genererModeA() {
            document.getElementById('label-mode').innerText = "Mode A : Identification";
            state.pointsManche = 30;
            state.indicesAffiches = 1;
            
            // Piocher cible
            const cible = state.donneesFiltrees[Math.floor(Math.random() * state.donneesFiltrees.length)];
            state.cibleCourante = cible;

            // Piocher distracteurs
            let autres = state.donneesFiltrees.filter(d => d.nom !== cible.nom);
            autres = melanger(autres).slice(0, 3);
            let options = melanger([cible, ...autres]);

            const container = document.getElementById('game-content');
            container.innerHTML = `
                <div class="bg-[#090d16] p-6 rounded-2xl border border-slate-800 text-center relative">
                    <p class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-4">Dossier Classifié — Mystère</p>
                    <div id="zone-indices" class="space-y-3 min-h-[100px]">
                        <p class="text-white text-lg font-medium italic">« ${cible.indices[0]} »</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4" id="zone-options">
                    ${options.map(opt => `<button onclick="validerReponseA('${opt.nom}')" class="option-btn text-white font-bold py-4 px-2 rounded-xl text-sm border-2 border-slate-700 w-full">${opt.nom}</button>`).join('')}
                </div>
            `;

            // Activer pastille indice
            document.getElementById('btn-pastille-indice').classList.remove('hidden');
            document.getElementById('btn-pastille-visuel').classList.remove('hidden'); // On permet de voir la forme en trichant un peu ou d'un indice
        }

        function afficherIndiceSup() {
            if(state.indicesAffiches >= 3) return;
            state.pointsManche -= 10;
            const idxText = state.cibleCourante.indices[state.indicesAffiches];
            document.getElementById('zone-indices').innerHTML += `<p class="text-slate-300 text-lg font-medium italic animate-in fade-in slide-in-from-top-2">« ${idxText} »</p>`;
            state.indicesAffiches++;
            if(state.indicesAffiches === 3) document.getElementById('btn-pastille-indice').classList.add('hidden');
        }

        function validerReponseA(nomChoisi) {
            gererFinManche(nomChoisi === state.cibleCourante.nom, state.cibleCourante.nom);
        }

        // ---------- MODE B : L'INTRUS ----------
        function genererModeB() {
            document.getElementById('label-mode').innerText = "Mode B : Anomalie (L'Intrus)";
            state.pointsManche = 10;
            document.getElementById('btn-pastille-visuel').classList.remove('hidden'); // Pastille dispo si besoin d'aide visuelle globale

            let intru, autres;
            // Choix du critère d'intrus selon niveau
            if (config.niveau !== '6H' && Math.random() > 0.5) {
                // Plane vs Solide
                const typeIntru = Math.random() > 0.5 ? 'solide' : 'plane';
                intru = melanger(state.donneesFiltrees.filter(d => d.type === typeIntru))[0];
                autres = melanger(state.donneesFiltrees.filter(d => d.type !== typeIntru)).slice(0, 3);
            } else {
                // Polygone vs Non-Polygone (Cercle)
                intru = state.donneesFiltrees.find(d => d.nom === 'Cercle');
                autres = melanger(state.donneesFiltrees.filter(d => d.nom !== 'Cercle')).slice(0, 3);
                if(!intru) { // Fallback si pas de cercle dispo
                    intru = state.donneesFiltrees[0];
                    autres = state.donneesFiltrees.slice(1,4);
                }
            }

            state.cibleCourante = intru;
            let options = melanger([intru, ...autres]);

            const container = document.getElementById('game-content');
            container.innerHTML = `
                <p class="text-center text-sm font-bold text-slate-300 mb-2">Identifiez l'anomalie parmi ces 4 profils :</p>
                <div class="grid grid-cols-2 gap-4">
                    ${options.map(opt => `<button onclick="validerReponseB('${opt.nom}')" class="option-btn bg-[#090d16] text-white font-bold py-6 px-2 rounded-xl border border-slate-700 flex flex-col items-center gap-3">
                        <span class="text-3xl">${opt.type === 'solide' ? '📦' : '📏'}</span>
                        <span>${opt.nom}</span>
                    </button>`).join('')}
                </div>
            `;
        }

        function validerReponseB(nomChoisi) {
            gererFinManche(nomChoisi === state.cibleCourante.nom, state.cibleCourante.nom);
        }

        // ---------- MODE C : LES BOÎTES ----------
        function genererModeC() {
            document.getElementById('label-mode').innerText = "Mode C : Classification";
            state.pointsManche = 10;
            document.getElementById('btn-pastille-visuel').classList.remove('hidden');

            const cible = state.donneesFiltrees[Math.floor(Math.random() * state.donneesFiltrees.length)];
            state.cibleCourante = cible;

            let critere1, critere2, bonneBoite;
            if (config.niveau !== '6H' && Math.random() > 0.5) {
                critere1 = "Figures Planes (2D)"; critere2 = "Solides (3D)";
                bonneBoite = cible.type === 'plane' ? 1 : 2;
            } else {
                critere1 = "Possède au moins 4 côtés"; critere2 = "Moins de 4 côtés / Courbe";
                const quatreEtPlus = ["Carré", "Rectangle", "Losange", "Parallélogramme", "Trapèze", "Cerf-volant", "Fer de lance", "Quadrilatère", "Trapèze rectangle", "Trapèze isocèle"];
                bonneBoite = quatreEtPlus.includes(cible.nom) ? 1 : 2;
            }
            state.cibleCourante.bonneBoite = bonneBoite;

            const container = document.getElementById('game-content');
            container.innerHTML = `
                <div class="text-center bg-[#090d16] border border-slate-800 p-6 rounded-2xl mb-4 shadow-inner">
                    <p class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-2">Sujet à classer :</p>
                    <p class="text-2xl font-black text-white">${cible.nom}</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="validerReponseC(1)" class="box-drop bg-[#172033] hover:bg-[#1f2b45] text-slate-200 font-bold p-6 rounded-xl flex flex-col items-center gap-3">
                        <span class="text-4xl text-emerald-400">📥</span>
                        <span class="text-sm">${critere1}</span>
                    </button>
                    <button onclick="validerReponseC(2)" class="box-drop bg-[#172033] hover:bg-[#1f2b45] text-slate-200 font-bold p-6 rounded-xl flex flex-col items-center gap-3">
                        <span class="text-4xl text-amber-400">📥</span>
                        <span class="text-sm">${critere2}</span>
                    </button>
                </div>
            `;
        }

        function validerReponseC(numBoite) {
            gererFinManche(numBoite === state.cibleCourante.bonneBoite, numBoite === 1 ? "Boîte 1" : "Boîte 2");
        }


        // ---------- GESTION CENTRALE ----------
        function gererFinManche(estCorrect, bonneReponseText) {
            // Désactiver les boutons
            document.querySelectorAll('button').forEach(b => { if(b.id !== 'btn-start') b.disabled = true; });
            
            const fb = document.getElementById('feedback');
            const container = document.getElementById('game-container');

            if (estCorrect) {
                state.scoreGlobal++;
                state.xp += state.pointsManche;
                fb.className = "text-center font-bold text-base mt-6 min-h-[3rem] flex items-center justify-center rounded-xl bg-emerald-950/80 text-emerald-400 border border-emerald-500/50";
                fb.innerText = `✅ Validation confirmée ! +${state.pointsManche} XP`;
                container.classList.add('success-anim');
            } else {
                fb.className = "text-center font-bold text-base mt-6 min-h-[3rem] flex items-center justify-center rounded-xl bg-rose-950/80 text-rose-400 border border-rose-500/50";
                fb.innerText = `❌ Anomalie. La cible était : ${state.cibleCourante.nom || bonneReponseText}`;
                container.classList.add('error-anim');
            }

            document.getElementById('score-xp').innerText = state.xp;
            
            setTimeout(() => {
                state.question++;
                document.querySelectorAll('button').forEach(b => b.disabled = false);
                chargerQuestion();
            }, 2500);
        }

        function afficherFigureVisuelle() {
            const svg = getSVGForShape(state.cibleCourante.nom);
            document.getElementById('visuel-svg-container').innerHTML = svg;
            document.getElementById('modal-figure').showModal();
        }

        async function terminerMission() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-card').classList.remove('hidden');
            
            document.getElementById('final-score').innerText = state.scoreGlobal;
            document.getElementById('final-xp').innerText = state.xp;
            
            let txt = state.scoreGlobal >= 8 ? "🏆 Maître Stratège ! Module géométrique validé." : "⚔️ Mission achevée. Une révision des données est conseillée.";
            document.getElementById('appreciation').innerText = txt;

            if (typeof window.enregistrerScoreFirebase === 'function') {
                const nomExercice = `Géométrie - Nv.${config.niveau} (${config.mode})`;
                await window.enregistrerScoreFirebase(nomExercice, state.scoreGlobal, 10 - state.scoreGlobal);
            }
        }
    </script>
</body>
</html>
