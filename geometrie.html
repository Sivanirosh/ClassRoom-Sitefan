<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secteur : Géométrie — Hub de Mission</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Style général de la page (Empêche le blanc pur agressif pour les yeux des élèves) */
        body {
            background-color: #0b0f19;
            color: #f1f5f9;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* La carte de jeu principale (Look SF / Espace avec un dégradé sombre) */
        .game-card {
            background: linear-gradient(135deg, #161d30 0%, #0f1524 100%);
            border: 1px solid #24324f;
        }

        /* Bouton Cyber 3D (Effet rétro tactile qui s'enfonce physiquement au clic / appui) */
        .btn-game-active {
            transform: translateY(0);
            box-shadow: 0 4px 0px 0px #05070f;
            transition: all 0.1s;
        }
        /* Changement de position de l'élément au moment du clic actif */
        .btn-game-active:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 0px 0px 0px #05070f;
        }

        /* Boutons d'options du quiz (Optimisés pour éviter les bugs de latence iPad) */
        .option-btn {
            touch-action: manipulation; /* Supprime le délai de latence de 300ms au toucher sur iOS */
            background-color: #172033;
            border: 2px solid #2e3e65;
            transition: all 0.2s;
        }
        /* Effet de surbrillance au survol de la souris */
        .option-btn:hover:not(:disabled) {
            border-color: #22d3ee; /* Bordure Cyan */
        }
        
        /* État appliqué lorsqu'un bouton de configuration est sélectionné par l'élève */
        .option-selected {
            background-color: #0e3f47 !important; /* Fond cyan très sombre */
            border-color: #22d3ee !important; /* Bordure Cyan flash */
            box-shadow: 0 0 12px rgba(34, 211, 238, 0.2);
        }
    </style>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Paramètres de connexion au projet Firebase de la classe
        const firebaseConfig = {
            apiKey: "AIzaSyAvXQI3f34J5htG-t9kroM4ynIqCgO9xXI",
            authDomain: "ma-classe-179de.firebaseapp.com",
            projectId: "ma-classe-179de",
            storageBucket: "ma-classe-179de.firebasestorage.app",
            messagingSenderId: "413792574665",
            appId: "1:413792574665:web:87c29e054af287018e0118"
        };

        // Initialisation de Firebase et de l'accès à la base Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const appId = "classe-primaire-2026"; // Identifiant de l'année scolaire en cours

        /**
         * Enregistre le résultat final d'un élève dans Firestore de manière asynchrone
         */
        async function enregistrerScoreFirebase(exercice, corrects, fautes) {
            // Récupère le nom de l'élève (soit dans l'URL, soit dans la session, soit valeur par défaut)
            const urlParams = new URLSearchParams(window.location.search);
            const nomEleve = urlParams.get('eleve') || sessionStorage.getItem('nomEleve') || "Anonyme";
            
            try {
                // Ajout d'un nouveau document dans la collection spécifiée
                await addDoc(collection(db, `artifacts/${appId}/public/data/scores`), {
                    nomEleve: nomEleve,
                    exercice: exercice,
                    corrects: corrects,
                    fautes: fautes,
                    timestamp: Date.now() // Permet de trier les résultats par ordre chronologique
                });
            } catch (e) { 
                console.error("Erreur critique de transmission Firebase:", e); 
            }
        }
        // Attachement de la fonction à l'objet global Window pour la rendre accessible depuis les scripts standards
        window.enregistrerScoreFirebase = enregistrerScoreFirebase;
    </script>
</head>
<body class="min-h-screen flex flex-col antialiased select-none">

    <header class="bg-[#090d16] border-b border-[#24324f] py-4 shadow-lg">
        <div class="max-w-4xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-cyan-500 to-blue-600 text-white p-2 rounded-xl border border-cyan-400/30 shadow-md">
                    <span class="text-xl">📐</span>
                </div>
                <div>
                    <h1 class="text-md font-black text-slate-200 tracking-wider uppercase">Secteur : Géométrie</h1>
                    <p id="affichage-nom" class="text-xs font-bold text-cyan-400 tracking-widest">Agent : Chargement...</p>
                </div>
            </div>
            <a href="index.html" class="bg-[#172033] hover:bg-[#1f2b45] text-slate-200 px-4 py-2 rounded-xl text-xs font-bold tracking-widest uppercase border border-[#2e3e65] transition-all">↩ QG</a>
        </div>

    <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-8 relative">
        
        <section id="config-screen" class="game-card rounded-2xl p-6 sm:p-10 border shadow-xl max-w-2xl mx-auto space-y-8 tracking-wide">
            <div class="text-center">
                <h2 class="text-2xl font-black text-cyan-400 uppercase tracking-wider mb-2">Configuration de la Mission</h2>
                <p class="text-slate-400 text-sm">Paramétrez votre module d'entraînement géométrique.</p>
            </div>

            <div class="space-y-4">
                <label class="block text-xs font-bold text-amber-400 uppercase tracking-widest">1. Niveau de l'Agent :</label>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="selectLevel('6H')" id="btn-lvl-6H" class="lvl-btn option-btn text-slate-200 font-bold py-3 rounded-xl tracking-wide">Débutant (6H)</button>
                    <button onclick="selectLevel('7H')" id="btn-lvl-7H" class="lvl-btn option-btn text-slate-200 font-bold py-3 rounded-xl tracking-wide">Intermédiaire (7H)</button>
                    <button onclick="selectLevel('8H')" id="btn-lvl-8H" class="lvl-btn option-btn text-slate-200 font-bold py-3 rounded-xl tracking-wide">Avancé (8H)</button>

            </div>

            <div class="space-y-4">
                <label class="block text-xs font-bold text-amber-400 uppercase tracking-widest">2. Mode d'Analyse :</label>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="selectMode('A')" id="btn-mode-A" class="mode-btn option-btn text-slate-200 font-bold py-3 px-2 rounded-xl text-sm tracking-wide">🔍 Qui suis-je ?</button>
                    <button onclick="selectMode('B')" id="btn-mode-B" class="mode-btn option-btn text-slate-200 font-bold py-3 px-2 rounded-xl text-sm tracking-wide">⚠️ L'Intrus</button>
                    <button onclick="selectMode('C')" id="btn-mode-C" class="mode-btn option-btn text-slate-200 font-bold py-3 px-2 rounded-xl text-sm tracking-wide">📦 Les Boîtes</button>
                    <button onclick="selectMode('Mixte')" id="btn-mode-Mixte" class="mode-btn option-btn text-slate-200 font-bold py-3 px-2 rounded-xl text-sm tracking-wide">🎲 Aléatoire</button>
                </div>
            </div>

            <button onclick="demarrerMission()" id="btn-start" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-black px-4 py-4 rounded-xl text-sm uppercase tracking-widest border border-cyan-400/30 shadow-lg btn-game-active opacity-40 cursor-not-allowed" disabled>
                Initialiser la Mission 🚀
            </button>
        </section>

        <section id="game-screen" class="hidden flex flex-col gap-6 tracking-wide">
            
            <div class="game-card rounded-2xl p-4 px-6 border shadow-xl flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Analyse <span id="num-question" class="text-cyan-400 font-black text-lg">1</span> / 10</span>
                    <span id="label-mode" class="bg-[#090d16] text-slate-300 px-3 py-1 rounded-lg text-xs font-bold uppercase tracking-wider border border-[#24324f]">Mode</span>
                </div>
                <div class="text-right">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">XP Gagnée : <span id="score-xp" class="text-amber-400 font-black text-lg">0</span></span>
                </div>
            </div>

            <div id="game-container" class="game-card rounded-2xl p-6 sm:p-8 border shadow-xl min-h-[410px] flex flex-col relative transition-all duration-300">
                
                <div class="absolute top-4 right-4 flex gap-2 z-10">
                    <button onclick="afficherIndiceSup()" id="btn-pastille-indice" class="hidden bg-amber-950 hover:bg-amber-900 text-amber-400 border border-amber-500/40 p-2.5 rounded-full shadow-lg transition-all" title="Demander un indice (-10 XP)">
                        💡
                    </button>
                    <button onclick="afficherFigureVisuelle()" id="btn-pastille-visuel" class="hidden bg-cyan-950 hover:bg-cyan-900 text-cyan-400 border border-cyan-500/40 p-2.5 rounded-full shadow-lg transition-all" title="Voir la figure radar">
                        👁️
                    </button>

                <div id="game-content" class="flex-grow flex flex-col justify-center gap-6 mt-4"></div>

                <div id="feedback" class="text-center font-bold text-base mt-6 min-h-[3.5rem] flex items-center justify-center rounded-xl transition-all duration-300 tracking-wide"></div>

        </section>

        <section id="end-card" class="hidden game-card rounded-2xl p-8 border shadow-xl text-center space-y-6 tracking-wide">
            <h2 class="text-2xl font-black text-cyan-400 uppercase tracking-wider">🏁 Rapport de Mission Validé</h2>
            <div class="flex justify-center gap-6">
                <div class="bg-[#090d16] p-6 rounded-2xl border border-[#24324f] w-40 shadow-inner">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">XP Totale</p>
                    <p class="text-3xl font-black text-amber-400"><span id="final-xp">0</span></p>
                </div>
                <div class="bg-[#090d16] p-6 rounded-2xl border border-[#24324f] w-40 shadow-inner">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Précision</p>
                    <p class="text-3xl font-black text-emerald-400"><span id="final-score">0</span>/10</p>
                </div>
            </div>
            <p id="appreciation" class="font-bold text-slate-200 text-lg"></p>
            <div class="flex justify-center gap-4 pt-4">
                <button onclick="location.reload()" class="bg-[#172033] hover:bg-[#1f2b45] text-slate-200 font-black px-6 py-3 rounded-xl text-xs uppercase tracking-widest border border-[#2e3e65] btn-game-active">Rejouer</button>
                <a href="index.html" class="inline-block bg-cyan-600 hover:bg-cyan-500 text-white font-black px-6 py-3 rounded-xl text-xs uppercase tracking-widest border border-cyan-400/30 shadow-lg btn-game-active">Retour au QG</a>
            </div>
        </section>

        <dialog id="modal-figure" class="bg-transparent backdrop:bg-slate-950/80 p-4 fixed my-auto mx-auto inset-0 z-50">
            <div class="bg-[#0f1524] rounded-2xl shadow-2xl border border-cyan-500/40 max-w-sm w-full p-6 text-center">
                <h3 class="text-sm font-black text-cyan-400 uppercase tracking-wider mb-4">Radar Géométrique</h3>
                <div id="visuel-svg-container" class="bg-[#090d16] rounded-xl border border-[#24324f] p-8 flex justify-center items-center min-h-[200px] shadow-inner"></div>
                <button onclick="document.getElementById('modal-figure').close()" class="mt-6 w-full px-4 py-3 text-xs font-bold uppercase tracking-widest text-white bg-[#172033] hover:bg-[#1f2b45] rounded-xl border border-[#2e3e65] btn-game-active">Fermer le radar</button>
            </div>
        </dialog>

    </main>

    <script>
        // ==========================================
        // BASE DE DONNÉES DES FIGURES ET SOLIDES
        // ==========================================
        // Contient les propriétés géométriques fondamentales traduites en langage enfant sous forme d'indices cumulatifs.
        const banqueGeometrie = {
          "figures_planes": [
            { "nom": "Carré", "niveaux": ["6H", "7H", "8H"], "indices": ["Je suis un quadrilatère très régulier.", "Mes 4 côtés ont exactement la même longueur.", "J'ai 4 angles droits et mes diagonales se coupent à angle droit."] },
            { "nom": "Rectangle", "niveaux": ["6H", "7H", "8H"], "indices": ["Je suis un quadrilatère avec des angles droits.", "Mes côtés opposés sont parallèles et de même longueur, mais mes côtés adjacents ne le sont pas.", "Mes diagonales sont de même longueur mais ne se coupent pas à angle droit."] },
            { "nom": "Triangle", "niveaux": ["6H", "7H"], "indices": ["Je suis la plus simple des figures fermées à côtés droits.", "J'ai exactement 3 sommets.", "Le mot 'tri' au début de mon nom indique le nombre de mes côtés."] },
            { "nom": "Cercle", "niveaux": ["6H", "7H", "8H"], "indices": ["Je suis une figure parfaitement ronde.", "On me trace à l'aide d'un compas en plantant la pointe sur mon centre.", "Tous les points de ma ligne sont à la même distance (le rayon) du centre."] },
            { "nom": "Quadrilatère", "niveaux": ["7H", "8H"], "indices": ["Je suis une grande famille de figures planes.", "Mon nom commence par 'quadri' qui signifie quatre.", "Toute figure plate fermée qui possède exactement 4 côtés est l'un de mes membres."] },
            { "nom": "Triangle rectangle", "niveaux": ["7H", "8H"], "indices": ["Je suis un triangle particulier.", "Tu as absolument besoin d'une équerre pour me vérifier ou me dessiner proprement.", "Je possède un angle droit parfait de 90 degrés."] },
            { "nom": "Losange", "niveaux": ["7H", "8H"], "indices": ["Je suis un quadrilatère qui ressemble à un carré penché.", "Mes 4 côtés ont exactement la même longueur, mais je n'ai pas d'angles droits.", "Mes diagonales sont perpendiculaires et sont aussi mes seuls axes de symétrie."] },
            { "nom": "Parallélogramme", "niveaux": ["7H", "8H"], "indices": ["Je suis un quadrilatère dont le nom évoque des lignes qui ne se croisent jamais.", "Mes côtés opposés sont parallèles et de même longueur, mais je n'ai aucun axe de symétrie.", "Le rectangle, le losange et le carré sont des versions spéciales de ma forme."] },
            { "nom": "Trapèze", "niveaux": ["7H"], "indices": ["Je suis un quadrilatère dont les acrobates de cirque aiment le nom.", "Ma seule obligation est d'avoir au moins deux côtés opposés qui sont parallèles.", "Mes deux côtés parallèles s'appellent la 'grande base' et la 'petite base'."] },
            { "nom": "Cerf-volant", "niveaux": ["7H", "8H"], "indices": ["Je suis un quadrilatère qui porte le nom d'un objet volant.", "Mes côtés égaux ne sont pas face à face, ils sont côte à côte (adjacents).", "J'ai exactement 1 axe de symétrie qui sépare mes deux côtés égaux de chaque côté."] },
            { "nom": "Fer de lance", "niveaux": ["7H", "8H"], "indices": ["Je suis un quadrilatère non-convexe qui ressemble à une arme ancienne.", "J'ai la même règle pour mes côtés qu'un cerf-volant, mais ma forme est creuse.", "Je ressemble à une pointe de flèche et je possède un grand angle creux (rentrant)."] },
            { "nom": "Triangle isocèle", "niveaux": ["8H"], "indices": ["Je suis un triangle avec une propriété de symétrie.", "J'ai au moins deux côtés qui mesurent exactement la même longueur.", "Si on me coupe en deux par mon axe de symétrie, j'ai deux angles à ma base qui sont parfaits."] },
            { "nom": "Triangle équilatéral", "niveaux": ["8H"], "indices": ["Je suis le plus regular et le plus équilibré de tous les triangles.", "Mes trois côtés mesurent absolument la même longueur.", "J'ai 3 axes de symétrie et chacun de mes trois angles mesure exactement 60 degrés."] },
            { "nom": "Triangle isocèle rectangle", "niveaux": ["8H"], "indices": ["Je suis une figure double : j'ai les caractéristiques de deux triangles différents.", "Je possède à la fois un angle droit de 90° et deux côtés de même longueur.", "Mes deux petits angles mesurent exactement 45 degrés chacun."] },
            { "nom": "Trapèze rectangle", "niveaux": ["8H"], "indices": ["Je suis un membre spécial de la famille des trapèzes.", "J'ai 2 côtés parallèles, et l'un de mes côtés non-parallèles est perpendiculaire aux bases.", "Je possède exactement deux angles droits."] },
            { "nom": "Trapèze isocèle", "niveaux": ["8H"], "indices": ["Je suis un trapèze parfaitement symétrique.", "Mes deux côtés non-parallèles ont exactement la même longueur.", "Je possède un axe de symétrie vertical qui coupe mes deux bases parallèles en leur milieu."] }
          ],
          "solides": [
            { "nom": "Cube", "niveaux": ["7H", "8H"], "indices": ["Je suis un solide en 3D très connu dans les jeux de société (comme un dé).", "J'ai un total de 6 faces, 12 arêtes et 8 sommets.", "Toutes mes faces sont des carrés parfaitement identiques."] },
            { "nom": "Pavé droit", "niveaux": ["7H", "8H"], "indices": ["Je suis un solide en 3D qui ressemble à une boîte à chaussures ou une brique.", "J'ai le même nombre de faces (6), d'arêtes (12) et de sommets (8) que le cube.", "Mes faces ne sont pas des carrés, ce sont des rectangles."] },
            { "nom": "Pyramide à base carrée", "niveaux": ["7H", "8H"], "indices": ["Je suis un solide en 3D célèbre en Égypte.", "Je possède exactement 5 sommets, dont un qui se trouve tout en haut (l'apex).", "Ma base au sol est un carré, et mes 4 faces latérales sont des triangles."] },
            { "nom": "Tétraèdre", "niveaux": ["7H", "8H"], "indices": ["Je suis aussi appelé une 'pyramide à base triangulaire'.", "Je suis le plus simple des solides, j'ai seulement 4 sommets et 6 arêtes.", "Toutes mes faces, sans exception, sont des triangles."] }
          ]
        };

        // ==========================================
        // VARIABLES D'ÉTAT DU COMPTEUR DE JEU
        // ==========================================
        let config = { niveau: null, mode: null }; // Stocke les choix initiaux des menus de configuration
        let state = {
            question: 1,           // Index de l'étape courante (Max 10)
            scoreGlobal: 0,        // Total des bonnes réponses données
            xp: 0,                 // Jauge d'XP globale accumulée par l'élève
            donneesFiltrees: [],   // Liste restreinte des figures adaptées au niveau choisi (6H, 7H, 8H)
            modeCourant: null,     // Conserve la lettre du mode actif pour la manche en cours (Utile pour le mode mixte)
            cibleCourante: null,   // L'objet géométrique complet (la solution) tiré au sort à la question courante
            indicesAffiches: 0,    // Compteur interne d'indices dépliés pour l'énigme active
            pointsManche: 30       // Valeur maximale en XP de la question (Décroit si l'élève demande de l'aide)
        };

        // Sécurité essentielle anti-double clic fou (Verrouille les écrans tactiles pendant le feedback visuel)
        let blocageSaisie = false;

        // Extraction et assignation du nom de l'élève connecté via les paramètres URL ou le cache de session
        const urlParamsConfig = new URLSearchParams(window.location.search);
        const nomEleveConfig = urlParamsConfig.get('eleve') || sessionStorage.getItem('nomEleve') || "Explorateur";
        document.getElementById('affichage-nom').innerText = `Agent : ${nomEleveConfig}`;

        // ==========================================
        // MOTEUR DE DESSIN VECTORIEL (RENDU RADAR)
        // ==========================================
        /**
         * Génère dynamiquement une balise SVG contenant le dessin exact de la figure
         * @param {string} nom - Le nom de l'objet géométrique
         * @returns {string} - Chaîne XML représentant le composant visuel SVG avec style néon
         */
        function getSVGForShape(nom) {
            const baseClass = "w-32 h-32 text-cyan-400 drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]";
            const s = `<svg class="${baseClass}" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linejoin="round">`;
            const e = `</svg>`;
            switch(nom) {
                case 'Carré': return s + `<rect x="20" y="20" width="60" height="60"/>` + e;
                case 'Rectangle': return s + `<rect x="10" y="30" width="80" height="40"/>` + e;
                case 'Triangle': return s + `<polygon points="50,20 15,80 85,80"/>` + e;
                case 'Cercle': return s + `<circle cx="50" cy="50" r="35"/>` + e;
                case 'Losange': return s + `<polygon points="50,10 85,50 50,90 15,50"/>` + e;
                case 'Parallélogramme': return s + `<polygon points="25,30 90,30 75,70 10,70"/>` + e;
                case 'Trapèze': return s + `<polygon points="30,30 70,30 90,70 10,70"/>` + e;
                case 'Triangle rectangle': return s + `<polygon points="20,20 20,80 80,80"/><polyline points="20,70 30,70 30,80"/>` + e;
                case 'Cerf-volant': return s + `<polygon points="50,10 80,40 50,90 20,40"/>` + e;
                case 'Cube': return s + `<rect x="30" y="30" width="40" height="40"/><polyline points="30,30 45,15 85,15 85,55 70,70"/><polyline points="85,15 70,30"/>` + e;
                case 'Pyramide à base carrée': return s + `<polygon points="50,15 20,70 80,70"/><polyline points="50,15 35,60 80,70"/><polyline points="20,70 35,60"/>` + e;
                default: return s + `<text x="50" y="55" font-size="40" text-anchor="middle" fill="currentColor" stroke="none">?</text>` + e; // Fallback d'inconnue
            }
        }

        // ==========================================
        // GESTION DES MENUS DE SÉLECTION (CONFIG)
        // ==========================================
        /**
         * Enregistre le choix du niveau scolaire et applique l'état graphique actif au bouton cliqué
         */
        function selectLevel(lvl) {
            config.niveau = lvl;
            document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('option-selected'));
            document.getElementById('btn-lvl-'+lvl).classList.add('option-selected');
            checkReady();
        }

        /**
         * Enregistre le choix du mode de jeu et applique l'état graphique actif au bouton cliqué
         */
        function selectMode(m) {
            config.mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('option-selected'));
            document.getElementById('btn-mode-'+m).classList.add('option-selected');
            checkReady();
        }

        /**
         * Débloque le bouton d'initialisation de mission si les deux étapes du menu sont validées
         */
        function checkReady() {
            const btn = document.getElementById('btn-start');
            if(config.niveau && config.mode) {
                btn.removeAttribute('disabled');
                btn.classList.remove('opacity-40', 'cursor-not-allowed');
            }
        }

        // ==========================================
        // INITIALISATION ET ROUTAGE DE LA MISSION
        // ==========================================
        /**
         * Filtre les données selon l'âge et masque l'écran de configuration au profit de la zone de jeu
         */
        function demarrerMission() {
            // Extraction ciblée des tableaux selon l'éligibilité H
            let planes = banqueGeometrie.figures_planes.filter(f => f.niveaux.includes(config.niveau));
            let solides = banqueGeometrie.solides.filter(f => f.niveaux.includes(config.niveau));
            
            // Marquage du type de géométrie pour la mécanique de tri
            planes = planes.map(p => ({...p, type: 'plane'}));
            solides = solides.map(s => ({...s, type: 'solide'}));
            state.donneesFiltrees = [...planes, ...solides];

            // Bascule d'affichage graphique (Moteur DOM CSS standard)
            document.getElementById('config-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            chargerQuestion();
        }

        /**
         * Algorithme d'interversion aléatoire (Mélange de Fisher-Yates) pour briser l'ordre des boutons réponses
         */
        function melanger(array) {
            let clone = [...array];
            for (let i = clone.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [clone[i], clone[j]] = [clone[j], clone[i]];
            }
            return clone;
        }

        // ==========================================
        // ROUTAGE ET CONSTITUTION DES QUESTIONS
        // ==========================================
        /**
         * Réinitialise l'environnement visuel de la carte et distribue vers le bon constructeur d'exercice
         */
        function chargerQuestion() {
            // Vérification si la limite de l'exercice est dépassée
            if (state.question > 10) {
                terminerMission();
                return;
            }

            blocageSaisie = false; // Réouverture complète de la détection tactile
            document.getElementById('num-question').innerText = state.question;
            
            // Remise à zéro des messages de correction et réinitialisation de la couleur de la carte de base
            const fb = document.getElementById('feedback');
            fb.innerHTML = ''; 
            fb.className = "text-center font-bold text-base mt-6 min-h-[3.5rem] flex items-center justify-center rounded-xl transition-all duration-300";
            document.getElementById('game-container').className = "game-card rounded-2xl p-6 sm:p-8 border shadow-xl min-h-[410px] flex flex-col relative transition-all duration-300";

            // Masquage temporaire des boutons d'assistance (Indices / Radars)
            document.getElementById('btn-pastille-indice').classList.add('hidden');
            document.getElementById('btn-pastille-visuel').classList.add('hidden');

            // Traitement adaptatif de l'arborescence si l'option aléatoire "Mixte" est en cours
            state.modeCourant = config.mode === 'Mixte' ? ['A', 'B', 'C'][Math.floor(Math.random()*3)] : config.mode;
            
            // Routage logique vers les moteurs d'injection html dédiés
            if(state.modeCourant === 'A') genererModeA();
            else if(state.modeCourant === 'B') genererModeB();
            else genererModeC();
        }

        // ==========================================
        // MODE A : LOGIQUE RECHERCHE DU "QUI SUIS-JE ?"
        // ==========================================
        /**
         * Génère un problème d'identification par devinettes textuelles à indices imbriqués
         */
        function genererModeA() {
            document.getElementById('label-mode').innerText = "Mode A : Identification";
            state.pointsManche = 30; // La valeur initiale est élevée car l'énigme textuelle requiert plus d'analyse
            state.indicesAffiches = 1; // Un seul indice visible au départ
            
            // Sélection aléatoire de la figure cible parmi la liste autorisée
            const cible = state.donneesFiltrees[Math.floor(Math.random() * state.donneesFiltrees.length)];
            state.cibleCourante = cible;

            // Filtrage et constitution d'un ensemble de 3 distracteurs erronés uniques
            let autres = state.donneesFiltrees.filter(d => d.nom !== cible.nom);
            autres = melanger(autres).slice(0, 3);
            let options = melanger([cible, ...autres]); // Intégration de la bonne réponse et brassage complet

            // Injection dynamique des blocs dans le HTML de la page
            const container = document.getElementById('game-content');
            container.innerHTML = `
                <div class="bg-[#090d16] p-5 rounded-2xl border border-[#24324f] text-center shadow-inner">
                    <p class="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-3">Dossier Classifié — Flux Crypté</p>
                    <div id="zone-indices" class="space-y-2 min-h-[90px] flex flex-col justify-center">
                        <p class="text-slate-200 text-md font-medium italic">« ${cible.indices[0]} »</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4" id="zone-options">
                    ${options.map(opt => `<button onclick="validerReponseA('${opt.nom}')" class="option-btn text-slate-200 font-bold py-4 px-2 rounded-xl text-sm tracking-wide btn-game-active w-full">${opt.nom}</button>`).join('')}
                </div>
            `;

            // Révélation contrôlée des fonctionnalités d'aide à l'écran
            document.getElementById('btn-pastille-indice').classList.remove('hidden');
            document.getElementById('btn-pastille-visuel').classList.remove('hidden');
        }

        /**
         * Dévoile un indice textuel supplémentaire au clic de l'élève en appliquant une pénalité d'XP
         */
        function afficherIndiceSup() {
            if(state.indicesAffiches >= 3 || blocageSaisie) return;
            state.pointsManche -= 10; // Réduction forfaitaire du score potentiel de la question
            const idxText = state.cibleCourante.indices[state.indicesAffiches];
            document.getElementById('zone-indices').innerHTML += `<p class="text-slate-400 text-sm font-medium italic border-t border-slate-800/50 pt-2">« ${idxText} »</p>`;
            state.indicesAffiches++;
            
            // Masque l'ampoule si la totalité des indices du fichier JSON est consommée
            if(state.indicesAffiches === 3) document.getElementById('btn-pastille-indice').classList.add('hidden');
        }

        /**
         * Point d'entrée de validation pour le Mode A
         */
        function validerReponseA(nomChoisi) {
            if(blocageSaisie) return;
            gererFinManche(nomChoisi === state.cibleCourante.nom, state.cibleCourante.nom);
        }

        // ==========================================
        // MODE B : LOGIQUE RECHERCHE DE "L'INTRUS"
        // ==========================================
        /**
         * Crée un alignement de 4 figures dont une seule rompt l'homogénéité du groupe (ex: un solide au milieu de formes 2D)
         */
        function genererModeB() {
            document.getElementById('label-mode').innerText = "Mode B : Anomalie (L'Intrus)";
            state.pointsManche = 10;
            document.getElementById('btn-pastille-visuel').classList.add('hidden'); // Le radar est désactivé ici pour préserver le défi

            let intru, autres;
            // Pour les niveaux avancés (7H/8H), alternance régulière entre anomalie de Dimension (2D vs 3D) et cas particulier (Cercle sans arête droite)
            if (config.niveau !== '6H' && Math.random() > 0.5) {
                const typeIntru = Math.random() > 0.5 ? 'solide' : 'plane';
                let poolIntru = state.donneesFiltrees.filter(d => d.type === typeIntru);
                let poolAutres = state.donneesFiltrees.filter(d => d.type !== typeIntru);
                
                intru = melanger(poolIntru)[0];
                autres = melanger(poolAutres).slice(0, 3);
            } else {
                // Règle de fallback ou niveau de base 6H : Recherche du cercle au milieu de polygones à lignes brisées
                intru = state.donneesFiltrees.find(d => d.nom === 'Cercle');
                autres = melanger(state.donneesFiltrees.filter(d => d.nom !== 'Cercle')).slice(0, 3);
                if(!intru) { 
                    intru = state.donneesFiltrees[0];
                    autres = state.donneesFiltrees.slice(1, 4);
                }
            }

            state.cibleCourante = intru; // Dans ce mode, l'intrus à éliminer constitue la cible correcte à cliquer
            let options = melanger([intru, ...autres]);

            const container = document.getElementById('game-content');
            container.innerHTML = `
                <p class="text-center text-xs font-bold text-amber-400 uppercase tracking-widest mb-1">Analyse de cohérence :</p>
                <p class="text-center text-sm text-slate-400 mb-2">Détectez l'élément qui n'appartient pas au même groupe technique.</p>
                <div class="grid grid-cols-2 gap-4">
                    ${options.map(opt => `
                        <button onclick="validerReponseB('${opt.nom}')" class="option-btn text-slate-200 font-bold py-5 px-2 rounded-xl flex flex-col items-center gap-2 btn-game-active w-full">
                            <span class="text-2xl">${opt.type === 'solide' ? '📦' : '📏'}</span>
                            <span class="text-sm uppercase tracking-wide">${opt.nom}</span>
                        </button>
                    `).join('')}
                </div>
            `;
        }

        /**
         * Point d'entrée de validation pour le Mode B
         */
        function validerReponseB(nomChoisi) {
            if(blocageSaisie) return;
            gererFinManche(nomChoisi === state.cibleCourante.nom, state.cibleCourante.nom);
        }

        // ==========================================
        // MODE C : LOGIQUE DE CLASSIFICATION "LES BOÎTES"
        // ==========================================
        /**
         * Affiche un concept géométrique unique et demande à l'élève de l'aiguiller vers le bon container structurel
         */
        function genererModeC() {
            document.getElementById('label-mode').innerText = "Mode C : Classification";
            state.pointsManche = 10;
            document.getElementById('btn-pastille-visuel').classList.add('hidden');

            const cible = state.donneesFiltrees[Math.floor(Math.random() * state.donneesFiltrees.length)];
            state.cibleCourante = cible;

            let critere1, critere2, bonneBoite;
            // Détermination algorithmique de la règle d'aiguillage
            if (config.niveau !== '6H' && Math.random() > 0.5) {
                // Règle de tri basée sur la dimension spatiale
                critere1 = "Figures Planes (2D)"; 
                critere2 = "Solides (3D)";
                bonneBoite = cible.type === 'plane' ? 1 : 2;
            } else {
                // Règle de tri basée sur le dénombrement des sommets / frontières rectilignes (Propriétés des polygones)
                critere1 = "4 côtés ou plus"; 
                critere2 = "Moins de 4 côtés / Courbe";
                const quatreEtPlus = ["Carré", "Rectangle", "Losange", "Parallélogramme", "Trapèze", "Cerf-volant", "Fer de lance", "Quadrilatère", "Trapèze rectangle", "Trapèze isocèle"];
                bonneBoite = quatreEtPlus.includes(cible.nom) ? 1 : 2;
            }
            state.cibleCourante.bonneBoite = bonneBoite; // Enregistrement de la boîte attendue (1 ou 2)

            const container = document.getElementById('game-content');
            container.innerHTML = `
                <div class="text-center bg-[#090d16] border border-[#24324f] p-5 rounded-2xl mb-2 shadow-inner">
                    <p class="text-xs font-bold text-cyan-400 uppercase tracking-widest mb-1">Sujet à aiguiller :</p>
                    <p class="text-2xl font-black text-slate-100 tracking-wider uppercase font-mono">${cible.nom}</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="validerReponseC(1)" class="option-btn text-slate-200 font-bold p-5 rounded-xl flex flex-col items-center gap-2 btn-game-active">
                        <span class="text-3xl text-cyan-400">📥</span>
                        <span class="text-xs uppercase tracking-wider text-center">${critere1}</span>
                    </button>
                    <button onclick="validerReponseC(2)" class="option-btn text-slate-200 font-bold p-5 rounded-xl flex flex-col items-center gap-2 btn-game-active">
                        <span class="text-3xl text-cyan-400">📥</span>
                        <span class="text-xs uppercase tracking-wider text-center">${critere2}</span>
                    </button>
                </div>
            `;
        }

        /**
         * Point d'entrée de validation pour le Mode C (Prise en charge du clic tactile)
         */
        function validerReponseC(boiteChoisie) {
            if(blocageSaisie) return;
            gererFinManche(boiteChoisie === state.cibleCourante.bonneBoite, state.cibleCourante.bonneBoite === 1 ? 'Première boîte' : 'Deuxième boîte');
        }

        // ==========================================
        // DOUBLE ACCESSIBILITÉ : RECONNAISSANCE CLAVIER
        // ==========================================
        /**
         * Permet la validation au clavier physique pour les élèves à motricité fine restreinte (Mode classification uniquement)
         */
        window.addEventListener('keydown', (e) => {
            if (state.question > 10 || document.getElementById('game-screen').classList.contains('hidden') || blocageSaisie) return;
            
            // Touche "1" déclenche la boîte gauche, touche "2" déclenche la boîte droite
            if (state.modeCourant === 'C') {
                if (e.key === '1') validerReponseC(1);
                if (e.key === '2') validerReponseC(2);
            }
        });

        // ==========================================
        // DÉPLOYEMENT DU COMPOSANT VECTORIEL MODAL
        // ==========================================
        /**
         * Ouvre la fenêtre pop-up native "Dialog" et y dépose le rendu vectoriel néon généré
         */
        function afficherFigureVisuelle() {
            if (blocageSaisie) return;
            const container = document.getElementById('visuel-svg-container');
            container.innerHTML = getSVGForShape(state.cibleCourante.nom);
            document.getElementById('modal-figure').showModal(); // API Modale HTML5 native
        }

        // ==========================================
        // ANALYSE ET ÉVALUATION FORMATIVE DES MANCHES
        // ==========================================
        /**
         * Gère les calculs de scores, modifie l'interface en temps réel selon les résultats et applique une temporisation
         * @param {boolean} estCorrect - Indique si l'élève a sélectionné la réponse attendue
         * @param {string} reponseAttendue - Chaîne textuelle contenant la correction explicite
         */
        function gererFinManche(estCorrect, reponseAttendue) {
            blocageSaisie = true; // Isolation et verrouillage anti-clic fou pour sécuriser la temporisation sur iPad
            
            const fb = document.getElementById('feedback');
            const gc = document.getElementById('game-container');
            
            if (estCorrect) {
                state.scoreGlobal++;
                state.xp += state.pointsManche; // Incrémentation dynamique de la récompense
                document.getElementById('score-xp').innerText = state.xp;
                
                // Changement d'état graphique de l'interface en vert émeraude réconfortant
                fb.innerText = `🟢 ANALYSE VALIDE (+${state.pointsManche} XP)`;
                fb.className = "text-center font-bold text-base mt-6 min-h-[3.5rem] flex items-center justify-center rounded-xl transition-all duration-300 bg-emerald-950/80 text-emerald-400 border border-emerald-500/30 shadow-[0_0_15px_rgba(16,185,129,0.1)]";
                gc.className = "game-card rounded-2xl p-6 sm:p-8 border min-h-[410px] flex flex-col relative transition-all duration-300 border-emerald-500/40 shadow-[0_0_20px_rgba(16,185,129,0.15)]";
            } else {
                // Valorisation de l'erreur par l'affichage direct de la réponse attendue
                fb.innerText = `🔴 SÉCURITÉ COMPROMISE — Solution : ${reponseAttendue}`;
                fb.className = "text-center font-bold text-base mt-6 min-h-[3.5rem] flex items-center justify-center rounded-xl transition-all duration-300 bg-rose-950/80 text-rose-400 border border-rose-500/30 shadow-[0_0_15px_rgba(244,63,94,0.1)]";
                gc.className = "game-card rounded-2xl p-6 sm:p-8 border min-h-[410px] flex flex-col relative transition-all duration-300 border-rose-500/40 shadow-[0_0_20px_rgba(244,63,94,0.15)]";
            }

            // Temporisation de 2,5 secondes : laisse à l'élève le temps de lire la correction avant la question suivante
            setTimeout(() => {
                state.question++;
                chargerQuestion();
            }, 2500);
        }

        // ==========================================
        // CONCLUSION ET SAUVEGARDE DE LA MISSION
        // ==========================================
        /**
         * Calcule le bilan final, adapte l'appréciation textuelle et transmet l'objet de score à Firebase Firestore
         */
        function terminerMission() {
            // Permutation des panneaux d'affichage principaux
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-card').classList.remove('hidden');
            
            document.getElementById('final-xp').innerText = state.xp;
            document.getElementById('final-score').innerText = state.scoreGlobal;
            
            // Génération d'une appréciation pédagogique ciblée selon le taux de réussite
            const appreciation = document.getElementById('appreciation');
            if (state.scoreGlobal === 10) {
                appreciation.innerText = "⚡ Incroyable ! Code d'accès décrypté à 100%. Vous êtes un expert géomètre.";
            } else if (state.scoreGlobal >= 7) {
                appreciation.innerText = "👍 Très bon travail ! Le secteur est sécurisé, vos connaissances sont solides.";
            } else if (state.scoreGlobal >= 5) {
                appreciation.innerText = "🔍 Mission accomplie, mais le radar indique des failles à corriger. Entraînez-vous encore !";
            } else {
                appreciation.innerText = "⚠️ Alerte ! Données corrompues. Un retour au QG d'entraînement est fortement conseillé.";
            }

            // Calcul du ratio d'erreurs et structuration du nom de l'exercice pour le dashboard de suivi enseignant
            const fautes = 10 - state.scoreGlobal;
            const nomExercice = `Geometrie_${config.niveau}_Mode_${config.mode}`;
            
            // Appel de la méthode asynchrone Firebase importée dans le header
            if (typeof window.enregistrerScoreFirebase === 'function') {
                window.enregistrerScoreFirebase(nomExercice, state.scoreGlobal, fautes);
            }
        }
    </script>
</body>
