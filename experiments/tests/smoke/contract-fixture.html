<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smoke contract fixture</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: sans-serif; }
      main { width: 100%; min-height: 100vh; padding: 16px; }
      section { display: grid; max-width: 280px; gap: 12px; }
      button { min-height: 44px; }
    </style>
  </head>
  <body>
    <main
      data-smoke-root
      data-smoke-exercise="harness-fixture"
      data-smoke-program="smoke-fixture"
      data-smoke-state="ready"
    ></main>
    <script>
      const root = document.querySelector('[data-smoke-root]');
      const violation = new URLSearchParams(location.search).get('violation');
      let violationTriggered = false;

      function setPlan(name, value) {
        if (value) root.dataset[name] = value;
        else delete root.dataset[name];
      }

      function show(state, error = false) {
        root.dataset.smokeState = state;
        setPlan('smokeSuccessPlan', state === 'active' ? 'finish' : null);
        setPlan('smokeErrorPlan', state === 'active' ? 'probe' : null);
        setPlan('smokeRecoveryPlan', null);

        if (state === 'ready') {
          const tabIndex = violation === 'focus' ? ' tabindex="-1"' : '';
          const inactive = violation === 'inactive'
            ? '<button data-smoke-action="continue">Inactive continue</button>'
            : '';
          root.innerHTML = `<section><h1>Fixture</h1><button data-smoke-action="start"${tabIndex}>Start</button>${inactive}</section>`;
          if (violation === 'focus') root.querySelector('[data-smoke-action="start"]').focus();
        } else if (state === 'active') {
          root.innerHTML = `<section><h1>Manipulate the fixture</h1><button data-smoke-control="probe">Try a recoverable error</button><button data-smoke-control="finish">Complete the mechanic</button>${error ? '<p data-smoke-feedback="error" data-smoke-feedback-detail>This attempt leaves the fixture unchanged and explains how to recover safely.</p>' : ''}</section>`;
          if (!violationTriggered && violation === 'fetch') {
            violationTriggered = true;
            fetch('data:text/plain,undeclared').catch(() => {});
          }
          if (!violationTriggered && violation === 'frame') {
            violationTriggered = true;
            root.append(document.createElement('iframe'));
          }
        } else if (state === 'success') {
          root.innerHTML = '<section><p data-smoke-feedback="success" data-smoke-feedback-detail>The real control sequence reaches the intended state with a written explanation.</p><button data-smoke-action="continue">Continue</button></section>';
        } else {
          root.innerHTML = '<section><p data-smoke-completion>The complete pupil loop is finished.</p></section>';
        }

        root.querySelector('[data-smoke-action="start"]')?.addEventListener('click', () =>
          show('active', violation === 'stale-error')
        );
        root.querySelector('[data-smoke-control="probe"]')?.addEventListener('click', () => show('active', true));
        root.querySelector('[data-smoke-control="finish"]')?.addEventListener('click', () => show('success'));
        root.querySelector('[data-smoke-action="continue"]')?.addEventListener('click', () => show('complete'));
      }

      show('ready');
    </script>
  </body>
</html>
