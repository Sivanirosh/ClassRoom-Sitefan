<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Numéria - Les Royaumes Perdus</title>
    <link rel="stylesheet" href="style-commun.css">
    <style>
        .realm-card { background: linear-gradient(135deg, #f8fafc, #ffffff); border: 2px solid #e2e8f0; border-radius: 20px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .realm-card:hover:not(.locked) { transform: translateY(-5px); border-color: var(--color-numeria); }
        .realm-card.locked { opacity: 0.5; filter: grayscale(0.3); cursor: not-allowed; }
        .realm-icon { font-size: 48px; margin-bottom: 16px; }
        .mission-card { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.2s; }
        .mission-card:hover:not(.locked) { transform: translateX(5px); border-color: var(--color-numeria); }
        .mission-card.locked { opacity: 0.5; cursor: not-allowed; }
        .stars { color: #fbbf24; letter-spacing: 2px; }
        .codex-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 16px; text-align: center; }
        .codex-item.locked { opacity: 0.5; filter: grayscale(0.5); }
        .speak-btn { background: #fef3c7; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 20px; cursor: pointer; }
        .operation-large { font-size: 28px; font-weight: bold; text-align: center; font-family: monospace; background: #f8fafc; padding: 24px; border-radius: 20px; margin: 20px 0; }
    </style>
</head>
<body>
    <header class="page-header"><div class="header-container">
        <div class="header-title"><div class="header-icon" style="background:linear-gradient(135deg,var(--color-numeria),#34d399);">📜</div>
        <div><h1>Numéria</h1><p>Chroniques des nombres</p></div></div>
        <div style="display:flex;gap:12px;"><button id="btn-contrast" class="btn-contrast" onclick="toggleContrast()">👁️ Contraste+</button>
        <a href="index.html" class="btn-secondary" style="text-decoration:none;">↩ Quitter</a></div>
    </div></header>
    <main>
        <div id="screen-map" class="game-card"><h2 class="text-center" style="font-size:28px;">🗺️ La Carte des Royaumes</h2><div id="realms-container" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:24px;"></div></div>
        <div id="screen-realm" class="hidden game-card"><button onclick="showScreen('screen-map')" class="btn-secondary mb-4">← Retour</button><h2 id="realm-title" style="font-size:28px;text-align:center;"></h2><p id="realm-desc" class="text-center" style="color:var(--color-text-light);margin:8px 0 24px;"></p><div id="missions-container"></div></div>
        <div id="screen-mission" class="hidden game-card"><div class="flex justify-between mb-6"><span id="mission-progress">Question 1/5</span><span id="mission-score" style="color:var(--color-numeria);font-weight:bold;">⭐ 0</span></div><div class="text-right mb-2"><button class="speak-btn" onclick="parlerQuestion()">🔊</button></div><div id="question-container" class="operation-large"></div><div id="answer-zone" style="margin:20px 0;"></div><div id="feedback" class="feedback hidden"></div><div class="flex gap-3 justify-center"><button id="btn-validate" onclick="checkAnswer()" class="btn-primary">✅ Valider</button><button id="btn-next" onclick="nextQuestion()" class="btn-primary hidden">➡️ Suivant</button></div></div>
        <div id="screen-result" class="hidden game-card text-center"><h2 style="font-size:32px;">🏆 Mission accomplie !</h2><div style="background:#f8fafc;border-radius:24px;padding:32px;max-width:300px;margin:24px auto;"><p>Étoiles</p><p id="result-stars" style="font-size:48px;letter-spacing:8px;">⭐⭐⭐</p></div><div id="reward-zone" class="hidden" style="background:#fef3c7;border-radius:20px;padding:20px;margin:20px 0;"><p style="color:#d97706;">✨ Nouvel artefact ! ✨</p><p id="reward-name" style="font-weight:bold;"></p><p id="reward-desc"></p></div><button onclick="showScreen('screen-realm')" class="btn-primary">📜 Retour</button><a href="index.html" class="btn-primary" style="text-decoration:none;display:inline-block;margin-top:12px;">🏠 Accueil</a></div>
        <div id="screen-codex" class="hidden game-card"><button onclick="showScreen('screen-map')" class="btn-secondary mb-4">← Retour</button><h2 class="text-center" style="font-size:28px;">📖 Le Codex</h2><div id="codex-container" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-top:24px;"></div></div>
    </main>
    <script>
        const nomEleve = new URLSearchParams(window.location.search).get('eleve') || "Explorateur";
        const ROYAUMES=[{id:0,nom:"🏔️ Vallée des Fondations",desc:"Maîtrise la valeur des chiffres",theme:"position",icone:"🏔️"},{id:1,nom:"🌲 Forêt des Géants",desc:"Affronte les grands nombres",theme:"grands_nombres",icone:"🌲"},{id:2,nom:"🐊 Marais des Comparaisons",desc:"Compare les nombres",theme:"comparaison",icone:"🐊"},{id:3,nom:"⛰️ Montagnes Décimales",desc:"Explore les décimaux",theme:"decimaux",icone:"⛰️"},{id:4,nom:"🏰 Citadelle du Zéro",desc:"L'épreuve finale",theme:"boss",icone:"🏰"}];
        const ARTEFACTS=[{id:"amulette",nom:"Amulette des Unités",desc:"Brille d'une lueur essentielle"},{id:"batons",nom:"Bâton des Dizaines",desc:"Multiplie par 10"},{id:"grimoire",nom:"Grimoire du Million",desc:"Secrets des grands nombres"},{id:"balance",nom:"Balance de Justice",desc:"Compare les poids"}];
        let gameState={royaumesDeverrouilles:[0],missionsReussies:{},artefactsPossedes:[]};
        let mission={royaumeId:null,missionId:null,questions:[],index:0,score:0};
        function charger(){const s=localStorage.getItem('numeria_save');if(s)gameState=JSON.parse(s);}
        function sauver(){localStorage.setItem('numeria_save',JSON.stringify(gameState));}
        function showScreen(id){['screen-map','screen-realm','screen-mission','screen-result','screen-codex'].forEach(s=>document.getElementById(s).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');if(id==='screen-map')afficherCarte();if(id==='screen-codex')afficherCodex();}
        function afficherCarte(){const cont=document.getElementById('realms-container');cont.innerHTML=ROYAUMES.map(r=>{const ok=gameState.royaumesDeverrouilles.includes(r.id);const stars=Object.keys(gameState.missionsReussies).filter(k=>k.startsWith(r.id+'_')).reduce((m,k)=>Math.max(m,gameState.missionsReussies[k]),0);return `<div class="realm-card ${!ok?'locked':''}" onclick="${ok?`afficherRoyaume(${r.id})`:''}"><div class="realm-icon">${r.icone}</div><h3>${r.nom}</h3><p style="font-size:12px;color:var(--color-text-light);">${r.desc}</p>${stars>0?`<div class="stars">${'⭐'.repeat(stars)}</div>`:''}</div>`;}).join('');}
        function afficherRoyaume(id){const r=ROYAUMES[id];document.getElementById('realm-title').innerHTML=`${r.icone} ${r.nom}`;document.getElementById('realm-desc').innerHTML=r.desc;let debloque=1;const cont=document.getElementById('missions-container');cont.innerHTML='';for(let i=0;i<5;i++){const key=`${id}_${i}`;const score=gameState.missionsReussies[key]||0;const ok=i<debloque;cont.innerHTML+=`<div class="mission-card ${!ok?'locked':''}" onclick="${ok?`demarrerMission(${id},${i})`:''}"><div><strong>${i===4?'🐉 Gardien':`Mission ${i+1}`}</strong></div><div class="stars">${score>0?'⭐'.repeat(score):'◯ ◯ ◯'}</div></div>`;if(score===3)debloque=Math.max(debloque,i+2);}showScreen('screen-realm');}
        function genererQuestion(theme){if(theme==='boss')theme=['position','grands_nombres','comparaison','decimaux'][Math.floor(Math.random()*4)];let q={texte:"",type:"",options:[],reponse:null};if(theme==='position'){const n=Math.floor(Math.random()*90000)+1000;const ch=n.toString();const pos=['unités','dizaines','centaines','milliers','dizaines de milliers'];const idx=Math.floor(Math.random()*ch.length);q.texte=`Quel est le chiffre des ${pos[ch.length-1-idx]} dans ${n.toLocaleString('fr-CH')} ?`;q.type='qcm';q.reponse=ch[idx];let opts=new Set([q.reponse]);while(opts.size<4)opts.add(Math.floor(Math.random()*10).toString());q.options=Array.from(opts).sort(()=>Math.random()-0.5);}
        else if(theme==='grands_nombres'){const n=[1234,5678,12345,67890,123456][Math.floor(Math.random()*5)];q.texte=`Écris en chiffres : ${n.toLocaleString('fr-CH')}`;q.type='free';q.reponse=n.toString();}
        else if(theme==='comparaison'){const a=Math.floor(Math.random()*9000)+1000;const b=a+(Math.random()>0.5?Math.floor(Math.random()*500)+1:-Math.floor(Math.random()*500)-1);q.texte=`Quel est le plus grand nombre ?`;q.type='qcm';q.reponse=Math.max(a,b).toString();q.options=[a.toString(),b.toString()].sort(()=>Math.random()-0.5);}
        else if(theme==='decimaux'){const e=Math.floor(Math.random()*20)+1;const d=Math.floor(Math.random()*99)+1;q.texte=`Que vaut ${e},${d.toString().padStart(2,'0')} ?`;q.type='free';q.reponse=(e+d/100).toString().replace('.',',');}
        return q;}
        function demarrerMission(rid,mid){const r=ROYAUMES[rid];const questions=[];for(let i=0;i<5;i++)questions.push(genererQuestion(r.theme));mission={royaumeId:rid,missionId:mid,questions,index:0,score:0};document.getElementById('mission-progress').innerHTML='Question 1/5';document.getElementById('mission-score').innerHTML=`⭐ 0`;afficherQuestion();showScreen('screen-mission');}
        function afficherQuestion(){const q=mission.questions[mission.index];document.getElementById('question-container').innerHTML=q.texte;const zone=document.getElementById('answer-zone');zone.innerHTML='';document.getElementById('btn-validate').classList.remove('hidden');document.getElementById('btn-next').classList.add('hidden');document.getElementById('feedback').classList.add('hidden');if(q.type==='qcm'){const grid=document.createElement('div');grid.style.display='grid';grid.style.gridTemplateColumns='repeat(2,1fr)';grid.style.gap='12px';q.options.forEach(opt=>{const btn=document.createElement('button');btn.className='shape-card';btn.innerText=opt;btn.onclick=()=>{document.querySelectorAll('#answer-zone button').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');zone.dataset.reponse=opt;};grid.appendChild(btn);});zone.appendChild(grid);zone.dataset.reponse='';}
        else{const input=document.createElement('input');input.type='text';input.placeholder='Ta réponse...';input.className='answer-input';input.oninput=e=>zone.dataset.reponse=e.target.value;zone.appendChild(input);zone.dataset.reponse='';}}
        function checkAnswer(){const q=mission.questions[mission.index];const rep=document.getElementById('answer-zone').dataset.reponse;if(!rep){alert("Choisis une réponse !");return;}const correct=rep.toString().replace(',','.')===q.reponse.toString().replace(',','.');const fb=document.getElementById('feedback');if(correct){mission.score++;fb.className='feedback success';fb.innerHTML='✅ Exact ! +1 point';}else{fb.className='feedback error';fb.innerHTML=`❌ Oups ! La bonne réponse était ${q.reponse}`;}fb.classList.remove('hidden');document.getElementById('mission-score').innerHTML=`⭐ ${mission.score}`;document.getElementById('btn-validate').classList.add('hidden');document.getElementById('btn-next').classList.remove('hidden');}
        function nextQuestion(){mission.index++;if(mission.index<5){document.getElementById('mission-progress').innerHTML=`Question ${mission.index+1}/5`;afficherQuestion();}else terminerMission();}
        function terminerMission(){let etoiles=mission.score===5?3:mission.score>=3?2:mission.score>=1?1:0;const key=`${mission.royaumeId}_${mission.missionId}`;if(!gameState.missionsReussies[key]||gameState.missionsReussies[key]<etoiles)gameState.missionsReussies[key]=etoiles;let artefact=null;if(etoiles===3){const dispo=ARTEFACTS.filter(a=>!gameState.artefactsPossedes.includes(a.id));if(dispo.length){artefact=dispo[Math.floor(Math.random()*dispo.length)];gameState.artefactsPossedes.push(artefact.id);}}if(mission.missionId===4&&etoiles>=1){const next=mission.royaumeId+1;if(next<ROYAUMES.length&&!gameState.royaumesDeverrouilles.includes(next))gameState.royaumesDeverrouilles.push(next);}sauver();document.getElementById('result-stars').innerHTML='⭐'.repeat(etoiles)+'◯'.repeat(3-etoiles);const rz=document.getElementById('reward-zone');if(artefact){rz.classList.remove('hidden');document.getElementById('reward-name').innerHTML=artefact.nom;document.getElementById('reward-desc').innerHTML=artefact.desc;}else rz.classList.add('hidden');showScreen('screen-result');sauvegarderScore();}
        function sauvegarderScore(){const scores=JSON.parse(localStorage.getItem(`scores_${nomEleve}`)||'[]');scores.push({jeu:"numeria",score:mission.score,total:5,date:Date.now()});localStorage.setItem(`scores_${nomEleve}`,JSON.stringify(scores));if(window.parent&&window.parent.ajouterScore)window.parent.ajouterScore(nomEleve,"numeria",mission.score,5);}
        function afficherCodex(){const cont=document.getElementById('codex-container');cont.innerHTML=ARTEFACTS.map(a=>{const ok=gameState.artefactsPossedes.includes(a.id);return `<div class="codex-item ${!ok?'locked':''}"><div style="font-size:32px;">${ok?'✨':'❓'}</div><h3>${ok?a.nom:'???'}</h3><p style="font-size:12px;">${ok?a.desc:'À découvrir'}</p></div>`;}).join('');}
        function parlerQuestion(){const t=document.getElementById('question-container')?.innerText;if(t&&'speechSynthesis' in window){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';u.rate=0.9;window.speechSynthesis.speak(u);}}
        function toggleContrast(){document.body.classList.toggle('high-contrast');localStorage.setItem('highContrast',document.body.classList.contains('high-contrast'));}
        charger();if(localStorage.getItem('highContrast')==='true')document.body.classList.add('high-contrast');showScreen('screen-map');
    </script>
</body>
</html>
